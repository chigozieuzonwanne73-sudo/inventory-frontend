<mat-progress-bar mode="determinate" class="absolute top-0 left-0 right-0 invisible" [ngClass]="{'!visible': isLoading}"></mat-progress-bar>

<div class="page-layout overflow-hidden pb-8">
    <div class="header-bg bg-primary"></div>
    <div class="content">
      <div class="content-header flex flex-wrap justify-center items-center mb-4 ">
        <div class="search-box flex items-center crnk-search-bar w-96">
          <input class="bg-card " type="text" placeholder="Search by VIN" #serachTerm />
          <button mat-icon-button class="hover:fg-divider"><mat-icon>search</mat-icon></button>
        </div>
      </div>
  
      <div class="content-body" >
        <div class="" >
            <mat-card class="p-1 md:p-4  overflow-x-auto">
                <div class="item-table mb-6" >
                  <mat-table [dataSource]="lookupHistory" class="" #table >
                    <ng-container matColumnDef="VIN">
                      <mat-header-cell *matHeaderCellDef> VIN </mat-header-cell>
                      <mat-cell *matCellDef="let history"> {{ history.vin }} </mat-cell>
                    </ng-container>
                    
                    <ng-container matColumnDef="Lookup Date">
                      <mat-header-cell *matHeaderCellDef> Lookup Date </mat-header-cell>
                      <mat-cell *matCellDef="let history"> {{ history.lookupDate | date:'medium' }} </mat-cell>
                    </ng-container>
                    
                    <ng-container matColumnDef="Result Summary">
                      <mat-header-cell *matHeaderCellDef> Summary </mat-header-cell>
                      <mat-cell *matCellDef="let history"> {{ history.resultSummary }} </mat-cell>
                    </ng-container>
                    
                    <ng-container matColumnDef="Amount Paid">
                      <mat-header-cell *matHeaderCellDef> Amount Paid </mat-header-cell>
                      <mat-cell *matCellDef="let history"> ₦{{ history.amountPaid }} </mat-cell>
                    </ng-container>
                    
                    <ng-container matColumnDef="View">
                      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
                      <mat-cell *matCellDef="let history">
                        <button mat-icon-button color="primary" (click)="viewReport(history)">
                          <mat-icon>visibility</mat-icon>
                        </button>
                      </mat-cell>
                    </ng-container>

                     <div *matNoDataRow>
                      <tr class="mat-row " >
                        <td class="mat-cell text-center w-screen p-2" [attr.colspan]="itemTableColumn.length" >
                         No data available to display
                        </td>
                      </tr>
                      <tr class="mat-row " >
                        <td class="mat-cell text-center w-screen p-2" [attr.colspan]="itemTableColumn.length" >
                          <p-skeleton class=""  height="2rem" />
                        </td>
                      </tr>

                      <tr class="mat-row " >
                        <td class="mat-cell text-center w-screen p-2" [attr.colspan]="itemTableColumn.length" >
                          <p-skeleton class=""  height="2rem" />
                        </td>
                      </tr>
                      <tr class="mat-row " >
                        <td class="mat-cell text-center w-screen p-2" [attr.colspan]="itemTableColumn.length" >
                          <p-skeleton class=""  height="2rem" />
                        </td>
                      </tr>
                      <tr class="mat-row " >
                        <td class="mat-cell text-center w-screen p-2" [attr.colspan]="itemTableColumn.length" >
                          <p-skeleton class=""  height="2rem" />
                        </td>
                      </tr>
                     </div>           
                    

                    
                    <mat-header-row *matHeaderRowDef="itemTableColumn"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: itemTableColumn"></mat-row>
                  </mat-table>

                </div>
                <mat-paginator [length]="500" [pageSize]="30" aria-label="Select page of GitHub search results"></mat-paginator>
              </mat-card>
        </div>
      </div>
    </div>
  </div>
