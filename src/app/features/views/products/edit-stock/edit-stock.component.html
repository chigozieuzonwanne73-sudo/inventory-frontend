<div class="p-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Edit Stock for {{ data.product.name }}</h2>
        <button mat-icon-button (click)="close()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <form [formGroup]="stockForm" (ngSubmit)="onSubmit()">
        <div class="mb-4">
            <mat-label>Stock Quantity</mat-label>
            <mat-form-field appearance="outline" class="w-full">
                <input matInput type="number" formControlName="stockQuantity" min="0" required>
                <mat-error *ngIf="stockForm.get('stockQuantity')?.hasError('required')">
                    Stock quantity is required
                </mat-error>
                <mat-error *ngIf="stockForm.get('stockQuantity')?.hasError('min')">
                    Stock quantity must be 0 or greater
                </mat-error>
            </mat-form-field>
        </div>

        <div class="flex justify-end gap-2">
            <button mat-button type="button" (click)="close()">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="stockForm.invalid || isLoading">
                <mat-icon *ngIf="isLoading">refresh</mat-icon>
                Update Stock
            </button>
        </div>
    </form>
</div>
