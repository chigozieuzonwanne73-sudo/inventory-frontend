    [ngClass]="{'!visible': isLoading}"></mat-progress-bar> -->
<p-toast />
<div class="page-layout overflow-hidden pb-8">
    <div class="header-bg bg-primary"></div>
    <div class="content">
        <div class="content-header flex flex-wrap justify-center items-center mb-4 ">
            <div class="search-box flex items-center crnk-search-bar w-96">
                <input class="bg-card " type="text" placeholder="Search by Name" #serachTerm />
                <button mat-icon-button class="hover:fg-divider"><mat-icon>search</mat-icon></button>
            </div>
        </div>

        <div class="content-body">
            <div class="">
                <mat-card class="p-1 md:p-4  overflow-x-auto">
                    <div class="item-table mb-6">
                        <mat-table [dataSource]="shops" class="" class="w-full" #table>

                            <ng-container matColumnDef="Name">
                                <mat-header-cell *matHeaderCellDef> Name </mat-header-cell>
                                <mat-cell *matCellDef="let shop"> {{ shop.name }} </mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="Location">
                                <mat-header-cell *matHeaderCellDef> Location </mat-header-cell>
                                <mat-cell *matCellDef="let shop"> {{ shop.location }} </mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="Employee Count">
                                <mat-header-cell *matHeaderCellDef> Employee Count </mat-header-cell>
                                <mat-cell *matCellDef="let shop"> {{ shop.employeeCount }} </mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="View">
                                <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
                                <mat-cell *matCellDef="let product">
                                    <button mat-icon-button color="primary" (click)="viewProduct(product)">
                                        <mat-icon>visibility</mat-icon>
                                    </button>
                                </mat-cell>
                            </ng-container>

                            <mat-header-row *matHeaderRowDef="itemTableColumn"></mat-header-row>
                            <mat-row *matRowDef="let row; columns: itemTableColumn"></mat-row>
                        </mat-table>

                    </div>
                    <mat-paginator [length]="totalRecords" [pageSize]="pageSize"
                        [pageSizeOptions]="[10, 20, 30, 40, 50]" aria-label="Select page"></mat-paginator>
                </mat-card>
            </div>
        </div>
    </div>
</div>
