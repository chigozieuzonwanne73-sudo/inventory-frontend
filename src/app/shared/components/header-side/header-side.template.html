<mat-toolbar class="topbar flex bg-card">
  <!-- Sidenav toggle button -->
  <button *ngIf="layoutConf.sidebarStyle !== 'compact'" mat-icon-button id="sidenavToggle" (click)="toggleSidenav()"
    matTooltip="Toggle Hide/Open">
    <mat-icon>menu</mat-icon>
  </button>




  <span class="flex-grow"></span>
  <!-- Language Switcher -->

  <!-- Top left user menu -->
  <button mat-icon-button [matMenuTriggerFor]="accountMenu" class="">
    <img src="../../../../assets/images/pfp-placeholder.jpg" alt="" class="!w-6 !h-6 rounded-full" />
  </button>

  <mat-menu #accountMenu="matMenu" class="text-primary">
    <button mat-menu-item [routerLink]="['/profile/overview']">
      <mat-icon>help_center</mat-icon>
      <span class="text-primary">Support</span>
    </button>
    <button mat-menu-item [routerLink]="['/profile/settings']">
      <mat-icon>library_books</mat-icon>
      <span class="text-primary">FAQs</span>
    </button>
    <button mat-menu-item (click)="jwtAuth.signout()">
      <mat-icon>exit_to_app</mat-icon>
      <span class="text-primary">{{ "SIGNOUT" | translate }}</span>
    </button>
  </mat-menu>
</mat-toolbar>
